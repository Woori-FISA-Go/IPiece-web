name: Frontend PROD CI/CD (Release Branch)

on:
  push:
    branches: [ "release/#test" ]  # [변경] feat/cicd-test -> release 브랜치로 변경
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ipiece-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1) 현재 레포(IPiece-web) 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2) pnpm 설치
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3) Node.js 설정
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # 4) 의존성 설치
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5) 빌드 (Next.js)
      - name: Run build
        run: pnpm build

      # 6) AWS 권한 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 7) ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 8) Docker 빌드 & 푸시
      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          # 운영 배포용이니 latest 태그도 갱신
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # [NEW] 8.5) Kustomize 설치 (YAML 수정을 위해 필수)
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      # [UPDATE] 9) GitOps 레포지토리 업데이트 (Prod 환경)
      - name: Update manifests repo (Prod Overlay)
        env:
          GIT_TOKEN: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          # 1. 토큰 처리 및 Git 유저 설정
          TRIMMED_TOKEN=$(echo "$GIT_TOKEN" | tr -d '\n' | tr -d '\r')
          
          git config --global user.email "ci@ipiece.local"
          git config --global user.name "ipiece-ci"
          git config --global credential.helper store
          echo "https://x-access-token:${TRIMMED_TOKEN}@github.com" > ~/.git-credentials

          # 2. Manifest 레포 Clone
          git clone https://github.com/Woori-FISA-Go/ipiece-manifests.git
          
          # [중요] release 브랜치 배포이므로 'prod' 환경으로 이동
          cd ipiece-manifests/apps/frontend/overlays/prod

          # 3. Kustomize로 이미지 태그 변경
          # ipiece-frontend라는 이름의 이미지를 찾아서 태그를 교체함
          kustomize edit set image ipiece-frontend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          # 4. 변경사항 확인 (로그용)
          echo ">>> Changed kustomization.yaml content:"
          cat kustomization.yaml

          # 5. 커밋 & 푸시
          if git diff --quiet; then
            echo "⭕ No changes to commit."
          else
            git add kustomization.yaml
            git commit -m "chore(prod): update frontend image to ${IMAGE_TAG}"
            git push
          fi