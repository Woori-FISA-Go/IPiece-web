name: Frontend PROD CI/CD (Release Branch)

on:
  push:
    branches: [ "release/**", "develop" ] # release/**, develop 브랜치 푸시 시 동작
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ipiece-frontend
  # 👇 실행마다 유니크한 태그 (커밋 SHA + run_number)
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # [삭제됨] Run build 단계는 도커 빌드와 중복되므로 제거했습니다.

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Prod 환경의 ALB API 주소 (http:// 꼭 포함)
          # 만약 Secrets로 관리 중이라면 ${{ secrets.PROD_API_URL }} 형태로 변경하세요.
          API_URL: http://k8s-ipiece-27c2020024-347856893.ap-northeast-2.elb.amazonaws.com/api
        run: |
          echo "Using IMAGE_TAG = $IMAGE_TAG"

          # --build-arg 옵션으로 도커 빌드 시점에 URL 주입
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$API_URL \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          # Prod는 'latest' 태그도 같이 관리
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update manifests repo (Prod Overlay)
        env:
          GIT_TOKEN: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          TRIMMED_TOKEN=$(echo "$GIT_TOKEN" | tr -d '\n' | tr -d '\r')
          git config --global user.email "ci@ipiece.local"
          git config --global user.name "ipiece-ci"
          git config --global credential.helper store
          echo "https://x-access-token:${TRIMMED_TOKEN}@github.com" > ~/.git-credentials

          # 매니페스트 레포 Clone (develop 브랜치)
          git clone -b develop https://github.com/Woori-FISA-Go/ipiece-manifests.git
          
          # Prod 오버레이 폴더로 이동
          cd ipiece-manifests/apps/frontend/overlays/prod

          echo "Applying IMAGE_TAG = $IMAGE_TAG to kustomization.yaml"
          echo "Before:"
          grep -i "ipiece-frontend" kustomization.yaml || true

          # Kustomize로 이미지 태그 변경
          kustomize edit set image ipiece-frontend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "After:"
          grep -i "ipiece-frontend" kustomization.yaml || true

          # 커밋 & 푸시
          cd ../../../..
          if git diff --quiet; then
            echo "⭕ No changes to commit."
          else
            git add .
            git commit -m "chore(prod): update frontend image to ${IMAGE_TAG}"
            git push origin develop
          fi
