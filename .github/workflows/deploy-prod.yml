name: Frontend PROD CI/CD (Release Branch)

on:
  push:
    branches: [ "release/**", "develop" ] # release/**, develop 브랜치 푸시 시 동작
    # ✅ README(.md)만 수정된 커밋은 CI/CD 돌지 않게
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ipiece-frontend
  # 👇 실행마다 유니크한 태그 (커밋 SHA + run_id + run_attempt)
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.export-image-tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # [삭제됨] Run build 단계는 도커 빌드와 중복되므로 제거했습니다.

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}

          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GRAFANA_EKS_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_EKS_URL }}
          NEXT_PUBLIC_GRAFANA_ALB_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_ALB_URL }}
          NEXT_PUBLIC_GRAFANA_RDS_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_RDS_URL }}
          NEXT_PUBLIC_GRAFANA_VPN_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_VPN_URL }}
          NEXT_PUBLIC_GRAFANA_NAT_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_NAT_URL }}
          NEXT_PUBLIC_GRAFANA_S3_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_S3_URL }}
          NEXT_PUBLIC_GRAFANA_SENSITIVE_DB_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_SENSITIVE_DB_URL }}
          NEXT_PUBLIC_GRAFANA_RPC_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_RPC_URL }}
          NEXT_PUBLIC_GRAFANA_BLOCKCHAIN_VALIDATE_URL: ${{ secrets.NEXT_PUBLIC_GRAFANA_BLOCKCHAIN_VALIDATE_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }} # 🔥 WebSocket URL 추가

        run: |
          echo "Using IMAGE_TAG = $IMAGE_TAG"
          echo "Using NEXT_PUBLIC_API_URL = $NEXT_PUBLIC_API_URL"
          echo "Using NEXT_PUBLIC_WS_URL = $NEXT_PUBLIC_WS_URL"

          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_EKS_URL=$NEXT_PUBLIC_GRAFANA_EKS_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_ALB_URL=$NEXT_PUBLIC_GRAFANA_ALB_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_RDS_URL=$NEXT_PUBLIC_GRAFANA_RDS_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_VPN_URL=$NEXT_PUBLIC_GRAFANA_VPN_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_NAT_URL=$NEXT_PUBLIC_GRAFANA_NAT_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_S3_URL=$NEXT_PUBLIC_GRAFANA_S3_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_EC2_URL=$NEXT_PUBLIC_GRAFANA_EC2_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_EKS_POD_URL=$NEXT_PUBLIC_GRAFANA_EC2_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_SENSITIVE_DB_URL=$NEXT_PUBLIC_GRAFANA_SENSITIVE_DB_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_RPC_URL=$NEXT_PUBLIC_GRAFANA_RPC_URL \
            --build-arg NEXT_PUBLIC_GRAFANA_BLOCKCHAIN_VALIDATE_URL=$NEXT_PUBLIC_GRAFANA_BLOCKCHAIN_VALIDATE_URL \
            --build-arg NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL \

            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update manifests repo (Prod Overlay)
        env:
          GIT_TOKEN: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          TRIMMED_TOKEN=$(echo "$GIT_TOKEN" | tr -d '\n' | tr -d '\r')
          git config --global user.email "ci@ipiece.local"
          git config --global user.name "ipiece-ci"
          git config --global credential.helper store
          echo "https://x-access-token:${TRIMMED_TOKEN}@github.com" > ~/.git-credentials

          # 매니페스트 레포 Clone (develop 브랜치)
          git clone -b develop https://github.com/Woori-FISA-Go/ipiece-manifests.git
          
          # Prod 오버레이 폴더로 이동
          cd ipiece-manifests/apps/frontend/overlays/prod

          echo "Applying IMAGE_TAG = $IMAGE_TAG to kustomization.yaml"
          echo "Before:"
          grep -i "ipiece-frontend" kustomization.yaml || true

          # (가능하면) Kustomize로 이미지 태그 변경 시도
          kustomize edit set image ipiece-frontend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG || true

          echo "After:"
          grep -i "ipiece-frontend" kustomization.yaml || true

          # 루트로 올라가기
          cd ../../../..

          # 🔥 핵심: 매 실행마다 항상 달라지는 트리거 파일 생성
          echo "trigger: $(date -u +%Y-%m-%dT%H:%M:%SZ), image=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" > .deploy-trigger

          echo "Git status / diff 확인:"
          git status
          git diff || true

          # 커밋 & 푸시
          if git diff --quiet; then
            echo "⚠️ 여전히 변경이 없다면 뭔가 이상한 상황임 (이론상 거의 안 나와야 함)"
          else
            git add .
            git commit -m "chore(prod): update frontend image to ${IMAGE_TAG}"
            git push origin develop
          fi

      - name: Export image tag for downstream jobs
        id: export-image-tag
        run: echo "value=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  notify:
    name: Notify CI/CD result to Slack (Frontend)
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    # 🔔 성공/실패/취소 모두 알림
    if: ${{ always() }}
    steps:
      - name: Send Slack notification
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BUILD_STATUS: ${{ needs.build-and-push.result }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          echo "Build Job: $BUILD_STATUS"

          # 전체 파이프라인 상태 계산 (프론트는 단일 job 기준)
          if [ "$BUILD_STATUS" = "success" ]; then
            PIPELINE_STATUS="success"
            COLOR="good"
          elif [ "$BUILD_STATUS" = "cancelled" ]; then
            PIPELINE_STATUS="cancelled"
            COLOR="#AAAAAA"
          else
            PIPELINE_STATUS="failure"
            COLOR="danger"
          fi

          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="(build failed or skipped)"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "text": "[FRONTEND] IPiece PROD CI/CD 결과: *$PIPELINE_STATUS*",
            "attachments": [
              {
                "color": "$COLOR",
                "fields": [
                  {
                    "title": "레포지토리",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "브랜치",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "이미지 태그",
                    "value": "$IMAGE_TAG",
                    "short": true
                  },
                  {
                    "title": "Build / Deploy",
                    "value": "$BUILD_STATUS",
                    "short": true
                  },
                  {
                    "title": "실행자",
                    "value": "${{ github.actor }}",
                    "short": true
                  },
                  {
                    "title": "GitHub Actions 링크",
                    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "short": false
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK_URL"
